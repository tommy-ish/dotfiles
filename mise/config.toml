[bootstrap.packages]
"brew:gh" = "latest"
"brew-cask:visual-studio-code" = "latest"
"brew-cask:claude" = "latest"
"brew-cask:chatgpt" = "latest"

[bootstrap.repos]
"~/src/dotfiles" = { url = "git@github.com:tommy-ish/dotfiles.git", ref = "main" }

[dotfiles]
"~/.gitconfig" = "~/src/dotfiles/.gitconfig"
"~/.dotfiles" = "~/src/dotfiles"
"~/.config/mise/config.toml" = "~/src/dotfiles/mise/config.toml"
